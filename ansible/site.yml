- name: Base OS prep + container runtime + k8s packages
  hosts: all
  become: true
  vars:
    k8s_phase: packages
  roles:
    - common
    - containerd
    - kubernetes

- name: Initialize control-plane
  hosts: kube_control_plane
  become: true
  vars:
    k8s_phase: control_plane
  roles:
    - kubernetes

- name: Join workers
  hosts: kube_workers
  become: true
  vars:
    k8s_phase: join
  roles:
    - kubernetes

- name: Install Cilium CNI
  hosts: kube_control_plane
  become: true
  roles:
    - cilium

- name: Install ingress-nginx
  hosts: kube_control_plane
  become: true
  roles:
    - ingress_nginx

- name: Install cert-manager
  hosts: kube_control_plane
  become: true
  roles:
    - cert_manager

- name: Install Argo CD
  hosts: kube_control_plane
  become: true
  roles:
    - argocd

- name: Install Prometheus + Grafana
  hosts: kube_control_plane
  become: true
  roles:
    - monitoring

- name: Apply Ingress routes
  hosts: kube_control_plane
  become: true
  roles:
    - ingress_routes

- name: Install local-path storage provisioner
  hosts: kube_control_plane
  become: true
  roles:
    - storage_local_path

- name: Install and deploy Kafka cluster
  hosts: kube_control_plane
  become: true
  roles:
    - kafka

- name: Deploy PostgresDB
  hosts: kube_control_plane
  become: true
  roles:
    - postgres

- name: Install MinIO AIStor
  hosts: kube_control_plane
  become: true
  roles:
    - minio

- name: Install Spark operator
  hosts: kube_control_plane
  become: true
  roles:
    - spark_operator

- name: Bootstrap ArgoCD project and apps
  hosts: kube_control_plane
  become: true
  tasks:
    - name: Copy ArgoCD project manifest
      copy:
        src: roles/argocd/files/argocd-project.yaml
        dest: /tmp/argocd-project.yaml

    - name: Copy ArgoCD apps manifest
      copy:
        src: roles/argocd/files/argocd-apps.yaml
        dest: /tmp/argocd-apps.yaml

    - name: Apply ArgoCD project
      command: kubectl apply -f /tmp/argocd-project.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

    - name: Apply ArgoCD apps
      command: kubectl apply -f /tmp/argocd-apps.yaml
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      changed_when: true

- name: Deploy Dashboard API
  hosts: kube_control_plane
  become: true
  roles:
    - dashboard_api