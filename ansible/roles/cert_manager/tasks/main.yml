- name: Install Helm (if missing)
  shell: |
    set -e
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  args:
    creates: /usr/local/bin/helm

- name: Add jetstack Helm repo
  command: helm repo add jetstack https://charts.jetstack.io
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  changed_when: false

- name: Install/upgrade cert-manager (with CRDs)
  command: >
    helm upgrade --install cert-manager jetstack/cert-manager
    --namespace cert-manager --create-namespace
    --set crds.enabled=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Apply ClusterIssuer (HTTP-01 via nginx)
  copy:
    dest: /tmp/clusterissuer.yaml
    content: |
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: {{ cluster_issuer_name }}
      spec:
        acme:
          email: {{ letsencrypt_email }}
          server: {{ acme_server }}
          privateKeySecretRef:
            name: {{ cluster_issuer_name }}
          solvers:
          - http01:
              ingress:
                ingressClassName: nginx
  changed_when: false

- name: Create/Update ClusterIssuer
  command: kubectl apply -f /tmp/clusterissuer.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true