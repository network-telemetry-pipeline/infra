- name: Install Helm (if missing)
  shell: |
    set -e
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  args:
    creates: /usr/local/bin/helm

- name: Add Cilium Helm repo
  command: helm repo add cilium https://helm.cilium.io/
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  changed_when: false

- name: Install/upgrade Cilium (kube-proxy replacement)
  command: >
    helm upgrade --install cilium cilium/cilium
    --namespace kube-system
    --version {{ cilium_version }}
    --set kubeProxyReplacement=true
    --set k8sServiceHost={{ private_ip }}
    --set k8sServicePort=6443
    --set operator.replicas=1
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Wait for Cilium rollout
  shell: |
    set -e
    kubectl -n kube-system rollout status ds/cilium --timeout=300s
    kubectl -n kube-system rollout status deploy/cilium-operator --timeout=300s
  args:
    executable: /bin/bash
  changed_when: false
  become: false
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config

- name: Wait for nodes Ready
  shell: |
    set -e
    kubectl wait --for=condition=Ready nodes --all --timeout=300s
  args:
    executable: /bin/bash
  changed_when: false
  become: false
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
