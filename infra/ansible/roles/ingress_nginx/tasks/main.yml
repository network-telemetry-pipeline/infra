- name: Install Helm (if missing)
  shell: |
    set -e
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  args:
    creates: /usr/local/bin/helm

- name: Create ingress-nginx namespace
  command: kubectl create namespace ingress-nginx
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: ns_out
  failed_when: ns_out.rc != 0 and ("AlreadyExists" not in ns_out.stderr)
  changed_when: ns_out.rc == 0

- name: Add ingress-nginx Helm repo
  command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  changed_when: false

- name: Install/upgrade ingress-nginx (NodePort 30080/30443)
  command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx
    --set controller.service.type=NodePort
    --set controller.service.nodePorts.http=30080
    --set controller.service.nodePorts.https=30443
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Wait for ingress-nginx controller rollout
  command: kubectl -n ingress-nginx rollout status deploy/ingress-nginx-controller --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
