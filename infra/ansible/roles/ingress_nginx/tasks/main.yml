- name: Label edge node (k8s-worker-01)
  command: kubectl label node k8s-worker-01 node-role.kubernetes.io/edge= --overwrite
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Install Helm (if missing)
  shell: |
    set -e
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  args:
    creates: /usr/local/bin/helm

- name: Add ingress-nginx Helm repo
  command: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  changed_when: false

- name: Install/upgrade ingress-nginx (hostNetwork on worker-01)
  command: >
    helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx
    --namespace ingress-nginx --create-namespace
    --set controller.kind=DaemonSet
    --set controller.hostNetwork=true
    --set controller.dnsPolicy=ClusterFirstWithHostNet
    --set controller.service.type=ClusterIP
    --set controller.nodeSelector."node-role\.kubernetes\.io/edge"=""
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Wait for ingress-nginx controller rollout
  command: kubectl -n ingress-nginx rollout status ds/ingress-nginx-controller --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false