- name: Install Helm (if missing)
  shell: |
    set -e
    if ! command -v helm >/dev/null 2>&1; then
      curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    fi
  args:
    creates: /usr/local/bin/helm

- name: Create argocd namespace
  command: kubectl create namespace argocd
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: ns_out
  failed_when: ns_out.rc != 0 and ("AlreadyExists" not in ns_out.stderr)
  changed_when: ns_out.rc == 0

- name: Add Argo Helm repo
  command: helm repo add argo https://argoproj.github.io/argo-helm
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  changed_when: false

- name: Install/upgrade Argo CD
  command: >
    helm upgrade --install argo-cd argo/argo-cd
    --namespace argocd
    --version {{ argocd_chart_version | default('9.4.1') }}
    --set server.service.type=ClusterIP
    --set server.insecure=true
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: true

- name: Wait for Argo CD server rollout
  command: kubectl -n argocd rollout status deploy/argo-cd-argocd-server --timeout=300s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false
